{{ extends "global/Page.html" }}

{{ block styles }}
<style>
  :root {
    --bg: #f6efe5;
    --bg-accent: #e8d6c2;
    --bg-deep: #d6b899;
    --card: rgba(255, 251, 245, 0.78);
    --card-strong: rgba(255, 255, 255, 0.55);
    --text: #2e2118;
    --muted: #6e5b4f;
    --border: rgba(104, 74, 50, 0.16);
    --primary: #b96235;
    --primary-dark: #8f4726;
    --secondary: #2f5c67;
    --secondary-soft: rgba(47, 92, 103, 0.1);
    --shadow: 0 28px 80px rgba(79, 52, 34, 0.16);
    --shadow-soft: 0 16px 36px rgba(79, 52, 34, 0.08);
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
    background:
      radial-gradient(circle at top left, rgba(185, 98, 53, 0.2), transparent 28%),
      radial-gradient(circle at 85% 18%, rgba(47, 92, 103, 0.14), transparent 24%),
      radial-gradient(circle at bottom right, rgba(214, 184, 153, 0.35), transparent 28%),
      linear-gradient(135deg, var(--bg), #fbf7f1 46%, var(--bg-accent));
    background-attachment: fixed;
    color: var(--text);
  }

  .otree-body {
    max-width: none;
    padding: 0;
  }

  .otree-title {
    display: none;
  }

  .app-shell {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 42px 22px;
  }

  .experiment-card {
    width: min(760px, 100%);
    padding: 34px;
    border-radius: 32px;
    background: var(--card);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    position: relative;
    overflow: hidden;
  }

  .experiment-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.22), transparent 26%),
      linear-gradient(120deg, rgba(255, 255, 255, 0.06), transparent 55%);
    pointer-events: none;
  }

  .experiment-card > * {
    position: relative;
    z-index: 1;
  }

  .card-topline {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
    color: var(--muted);
    font-size: 0.98rem;
  }

  .progress-track {
    width: 100%;
    height: 12px;
    border-radius: 999px;
    background: rgba(47, 36, 29, 0.07);
    overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(47, 36, 29, 0.06);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--secondary), var(--primary));
    border-radius: inherit;
    box-shadow: 0 4px 14px rgba(185, 98, 53, 0.2);
    transition: width 220ms ease;
  }

  .screen-content {
    padding: 30px 0 18px;
  }

  .eyebrow {
    display: inline-flex;
    padding: 9px 15px;
    border-radius: 999px;
    background: var(--secondary-soft);
    color: var(--secondary);
    font-size: 0.83rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  h1,
  h2,
  h3 {
    font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
    color: var(--text);
  }

  h1 {
    font-size: clamp(1.75rem, 4.6vw, 2.85rem);
    font-weight: 700;
    line-height: 1.1;
    margin: 22px 0 18px;
    letter-spacing: -0.03em;
  }

  h2 {
    font-size: clamp(1.35rem, 3vw, 1.9rem);
    line-height: 1.2;
    margin: 18px 0 12px;
  }

  .screen-copy p,
  .screen-copy li,
  .screen-copy label {
    font-size: 1.06rem;
    line-height: 1.75;
  }

  .screen-copy p {
    margin: 0 0 14px;
  }

  .screen-copy ul,
  .screen-copy ol {
    padding-left: 1.4rem;
    margin: 1rem 0;
  }

  .highlight-box {
    display: block;
    margin-top: 14px;
    padding: 16px 20px;
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.84), var(--card-strong));
    border: 1px solid var(--border);
    box-shadow: var(--shadow-soft);
  }

  .highlight-box strong {
    display: block;
    margin-bottom: 0.35rem;
    color: var(--secondary);
  }

  .big-value {
    display: inline-block;
    margin-top: 0.45rem;
    padding: 0.9rem 1.05rem;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.82);
    border: 1px solid var(--border);
    font-size: 1.6rem;
    font-weight: 800;
  }

  .btn-primary,
  .otree-btn-next {
    border: 0;
    border-radius: 999px;
    padding: 14px 28px;
    background: linear-gradient(180deg, #c86d3b, var(--primary));
    color: white;
    font-weight: 700;
    box-shadow: 0 14px 28px rgba(185, 98, 53, 0.18);
  }

  .form-check {
    padding: 0;
    margin-bottom: 0.8rem;
  }

  .form-check-label {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    width: 100%;
    padding: 16px 20px;
    border: 1px solid var(--border);
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.84), var(--card-strong));
    box-shadow: var(--shadow-soft);
  }

  .form-check-input {
    margin-top: 0;
    margin-left: 0;
    position: static;
  }

  .message-options {
    margin: 1rem 0;
  }

  .message-option-card {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    width: 100%;
    margin-bottom: 0.8rem;
    padding: 16px 20px;
    border: 1px solid var(--border);
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.84), var(--card-strong));
    box-shadow: var(--shadow-soft);
    cursor: pointer;
  }

  .message-choice-input {
    transform: scale(1.15);
  }

  .form-error {
    margin: 0.85rem 0 0;
    color: var(--primary-dark);
    font-weight: 700;
  }

  .raven-matrix-wrap {
    margin: 1rem 0 1.4rem;
    padding: 1rem;
    border: 1px solid var(--border);
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.84), var(--card-strong));
    box-shadow: var(--shadow-soft);
  }

  .raven-matrix-image {
    display: block;
    width: 100%;
    max-width: 620px;
    margin: 0 auto;
    height: auto;
  }

  .raven-options-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0.9rem;
    margin-bottom: 1rem;
  }

  .raven-option-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.55rem;
    padding: 0.9rem;
    border: 1px solid var(--border);
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.84), var(--card-strong));
    box-shadow: var(--shadow-soft);
    cursor: pointer;
    text-align: center;
  }

  .raven-option-input {
    transform: scale(1.1);
  }

  .raven-option-image {
    width: 100%;
    max-width: 120px;
    height: auto;
  }

  .raven-option-label {
    font-weight: 700;
    color: var(--muted);
  }

  .thank-you-scene {
    position: relative;
    overflow: hidden;
    margin-top: 1rem;
    padding: 2rem 1.2rem 2.4rem;
    border-radius: 24px;
    background:
      radial-gradient(circle at top, rgba(255, 255, 255, 0.9), transparent 42%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.74), rgba(232, 214, 194, 0.7));
    border: 1px solid var(--border);
    box-shadow: var(--shadow-soft);
    text-align: center;
  }

  .thank-you-title {
    position: relative;
    z-index: 1;
    margin: 0;
    font-size: clamp(2.2rem, 7vw, 4.4rem);
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--primary-dark);
    text-shadow: 4px 4px 0 rgba(255, 255, 255, 0.85);
  }

  .thank-you-note {
    position: relative;
    z-index: 1;
    margin: 1rem auto 0;
    max-width: 30rem;
    color: var(--muted);
  }

  .pixel-sparkle {
    position: absolute;
    width: 14px;
    height: 14px;
    background: #ffd86b;
    box-shadow:
      14px 0 0 #fff4c0,
      -14px 0 0 #ffbf5a,
      0 14px 0 #fff4c0,
      0 -14px 0 #ffbf5a;
    image-rendering: pixelated;
    opacity: 0.9;
    animation: pixel-twinkle 1.8s steps(4, end) infinite;
  }

  .pixel-sparkle.s1 {
    top: 22px;
    left: 12%;
    animation-delay: 0.1s;
    transform: scale(0.7);
  }

  .pixel-sparkle.s2 {
    top: 34px;
    right: 16%;
    animation-delay: 0.5s;
    transform: scale(0.95);
  }

  .pixel-sparkle.s3 {
    top: 96px;
    left: 20%;
    animation-delay: 0.9s;
    transform: scale(0.6);
  }

  .pixel-sparkle.s4 {
    top: 118px;
    right: 22%;
    animation-delay: 1.2s;
    transform: scale(0.8);
  }

  .pixel-sparkle.s5 {
    bottom: 36px;
    left: 28%;
    animation-delay: 0.3s;
    transform: scale(0.7);
  }

  .pixel-sparkle.s6 {
    bottom: 26px;
    right: 30%;
    animation-delay: 1s;
    transform: scale(0.9);
  }

  @keyframes pixel-twinkle {
    0% {
      opacity: 0.25;
      transform: scale(0.55);
    }

    50% {
      opacity: 1;
      transform: scale(1);
    }

    100% {
      opacity: 0.25;
      transform: scale(0.55);
    }
  }

  @media (max-width: 640px) {
    .app-shell {
      padding: 20px 14px;
    }

    .experiment-card {
      padding: 22px 18px;
      border-radius: 24px;
    }

    .card-topline {
      flex-direction: column;
      gap: 8px;
    }

    h1 {
      font-size: 1.8rem;
    }

    .raven-options-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .thank-you-scene {
      padding: 1.6rem 0.9rem 2rem;
    }
  }
</style>
{{ endblock }}

{{ block title }}{{ page_title }}{{ endblock }}

{{ block content }}
<div class="app-shell">
  <div class="experiment-card">
    <div class="eyebrow">{{ section_title }}</div>
    <div class="screen-content">
      <div class="card-topline">
        <div>{{ section_subtitle }}</div>
        <div>{{ progress_text }}</div>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-fill" style="width: {{ progress_percent }}%;"></div>
      </div>

      <div class="screen-copy">
        <h1>{{ page_title }}</h1>
        {{ block body_content }}{{ endblock }}
      </div>
    </div>
  </div>
</div>
{{ endblock }}
